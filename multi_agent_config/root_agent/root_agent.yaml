# yaml-language-server: $schema=https://raw.githubusercontent.com/google/adk-python/refs/heads/main/src/google/adk/agents/config_schemas/AgentConfig.json
agent_class: LlmAgent
name: root_agent
description: A helpful assistant for user questions.
instruction: |
  Please answer the users questions based on the information provided by the subagents. 
  Follow these Steps:
  1. Use Capital Agent to Provide the capital information of a given country
  2. Use papulation agent to provide the papulation information of given country
model: openai/openai/gpt-oss-120b
sub_agents:
  - config_path: capital_agent.yaml
  - config_path: papulation_agent.yaml
